<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emoji Mood Globe 🌍</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .emoji-bar {
      margin: 20px;
    }

    .emoji {
      font-size: 40px;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .emoji:hover {
      transform: scale(1.3);
    }

    #map {
      width: 90%;
      height: 400px;
      margin: 20px auto;
      background: radial-gradient(circle, #1b2a4a, #070a12);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      font-size: 20px;
    }

    .info {
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <h1>🌍 Emoji Mood Globe</h1>
  <p class="info">Click an emoji to broadcast your mood</p>

  <div class="emoji-bar">
    <span class="emoji" onclick="sendMood('😄')">😄</span>
    <span class="emoji" onclick="sendMood('😐')">😐</span>
    <span class="emoji" onclick="sendMood('😴')">😴</span>
    <span class="emoji" onclick="sendMood('😡')">😡</span>
    <span class="emoji" onclick="sendMood('🔥')">🔥</span>
  </div>

  <div id="map"></div>

  <script>
    let moods = JSON.parse(localStorage.getItem("moods")) || [];

    // fake global positions (since we don’t have real map yet)
    function randomPosition() {
      return {
        x: Math.random() * 90,
        y: Math.random() * 90
      };
    }

    function sendMood(emoji) {
      const pos = randomPosition();

      const mood = {
        emoji: emoji,
        x: pos.x,
        y: pos.y,
        time: Date.now()
      };

      moods.push(mood);
      localStorage.setItem("moods", JSON.stringify(moods));

      render();
    }

    function render() {
      const map = document.getElementById("map");
      map.innerHTML = "";

      moods.forEach(m => {
        const el = document.createElement("div");
        el.className = "dot";
        el.innerText = m.emoji;

        el.style.left = m.x + "%";
        el.style.top = m.y + "%";

        map.appendChild(el);
      });
    }

    render();
  </script>

</body>
</html>
